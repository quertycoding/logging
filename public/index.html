<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log Entry</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
      }
      .container {
        max-width: 760px;
        margin: 30px auto;
        background: #fff;
        padding: 16px;
        border: 1px solid #ddd;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.3rem;
      }
      label {
        display: block;
        margin: 10px 0 6px;
        font-weight: 600;
      }
      textarea {
        width: 100%;
        min-height: 140px;
        padding: 10px;
        border: 1px solid #bbb;
        resize: vertical;
      }
      textarea[readonly] {
        background: #fafafa;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }
      button {
        padding: 8px 14px;
        border: 1px solid #111;
        background: #111;
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
      .status {
        margin-top: 10px;
        font-size: 0.92rem;
        color: #333;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Log Entry</h1>
      <label for="topBox">Add new text</label>
      <textarea id="topBox" placeholder="Write your entry here..."></textarea>

      <div class="actions">
        <button id="saveBtn" type="button">Save</button>
        <button id="editFullBtn" type="button">Edit Full Text</button>
      </div>

      <label for="bottomBox">Saved text (read only)</label>
      <textarea id="bottomBox" readonly></textarea>

      <p id="status" class="status"></p>
    </main>

    <script>
      const topBox = document.getElementById("topBox");
      const bottomBox = document.getElementById("bottomBox");
      const saveBtn = document.getElementById("saveBtn");
      const editFullBtn = document.getElementById("editFullBtn");
      const status = document.getElementById("status");

      let mode = "append";

      async function loadEntries() {
        const response = await fetch("/entries");
        const data = await response.json();
        bottomBox.value = data.text || "";
      }

      function setStatus(message) {
        status.textContent = message;
      }

      editFullBtn.addEventListener("click", () => {
        topBox.value = bottomBox.value;
        mode = "full";
        setStatus("Full edit mode enabled. Save will overwrite all text.");
      });

      saveBtn.addEventListener("click", async () => {
        const entry = topBox.value;

        if (mode === "append" && !entry.trim()) {
          setStatus("Entry cannot be empty.");
          return;
        }

        const response = await fetch("/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ entry, mode })
        });

        const data = await response.json();

        if (!response.ok) {
          setStatus(data.error || "Failed to save entry.");
          return;
        }

        bottomBox.value = data.text || "";
        topBox.value = "";
        mode = "append";
        setStatus("Saved.");
      });

      loadEntries().catch(() => setStatus("Failed to load existing entries."));
    </script>
  </body>
</html>
